<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wealth & Analytics Tracker</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Tracker">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2454/2454269.png">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-color: #fcfcfd;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-sub: #94a3b8;
            --border-light: #f1f5f9;
            
            /* Theme Accent Colors from Reference UI */
            --pill-red-bg: #fee2e2;
            --pill-red-text: #ef4444;
            --pill-green-bg: #dcfce7;
            --pill-green-text: #16a34a;
            --pill-amber-bg: #fef3c7;
            --pill-amber-text: #d97706;
            
            --primary-purple: #7c3aed;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px 16px 90px 16px; /* Extra bottom padding for floating navigation bar */
            display: flex;
            justify-content: center;
        }
        
        .container { width: 100%; max-width: 500px; }
        
        /* Modern Native Top Info Display */
        .top-date-header {
            text-align: center;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--primary-purple);
            margin: 10px 0 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .total-card {
            background: var(--card-bg);
            padding: 22px;
            border-radius: 20px;
            text-align: center; 
            border: 1px solid var(--border-light);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            margin-bottom: 20px;
        }
        .total-card h2 { margin: 0; font-size: 0.8rem; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }
        .total-amount { font-size: 2.2rem; font-weight: 800; margin-top: 6px; color: var(--text-main); letter-spacing: -0.5px; }
        
        /* Refined Native Style Cards */
        .card {
            background: var(--card-bg);
            padding: 18px;
            border-radius: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border-light);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.01);
        }
        
        .form-group { margin-bottom: 14px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 14px; }
        .form-row .form-group { flex: 1; margin-bottom: 0; }
        
        label { display: block; margin-bottom: 6px; font-size: 0.8rem; font-weight: 600; color: #64748b; }
        
        input, select {
            width: 100%; padding: 12px 14px; border: 1px solid #e2e8f0;
            border-radius: 12px; font-size: 0.95rem; font-weight: 500;
            background-color: #f8fafc; color: var(--text-main); outline: none; transition: all 0.2s;
        }
        input:focus, select:focus { border-color: var(--primary-purple); background-color: #fff; box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.08); }
        
        button.submit-btn {
            width: 100%; color: white; border: none; padding: 14px; border-radius: 12px; 
            font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-top: 4px;
            background: var(--primary-purple); transition: opacity 0.1s;
        }
        button.submit-btn:active { opacity: 0.85; }
        
        .list-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-light); padding-bottom: 10px; margin-bottom: 12px; }
        .list-header h3 { margin: 0; font-size: 1rem; font-weight: 700; color: var(--text-main); }
        .section-title { font-weight: 700; font-size: 0.8rem; margin: 18px 0 10px 0; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.6px;}
        
        .clear-btn { background: none; color: #ef4444; border: none; font-size: 0.8rem; font-weight: 600; cursor: pointer; }
        .item-list { list-style: none; padding: 0; margin: 0; }
        
        /* Modern Row UI Items from Image Reference */
        .item-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid var(--border-light);
        }
        .item-row:last-child { border-bottom: none; }
        
        .item-left-block { display: flex; align-items: center; gap: 12px; }
        
        /* Circular Icon Backdrops */
        .icon-circle {
            width: 40px; height: 40px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.2rem; background: #f1f5f9;
        }
        
        /* Soft Pill UI Badges for Values */
        .val-pill {
            padding: 6px 14px; border-radius: 20px; font-weight: 700; font-size: 0.9rem;
            text-align: right; min-width: 95px; display: inline-block;
        }
        .pill-neutral { background: #f1f5f9; color: var(--text-main); }
        .pill-green { background: var(--pill-green-bg); color: var(--pill-green-text); }
